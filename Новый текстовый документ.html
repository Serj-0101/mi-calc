<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .calculator {
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 300px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #e0e0e0;
            border: none;
            border-radius: 5px;
            font-size: 2rem;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            color: #333;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #555;
            color: white;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #777;
        }

        button:active {
            background-color: #999;
        }

        .operator {
            background-color: #ff9800;
        }

        .operator:hover {
            background-color: #ffb74d;
        }

        .clear {
            background-color: #f44336;
            grid-column: span 2;
        }

        .clear:hover {
            background-color: #e57373;
        }

        .equals {
            background-color: #4caf50;
            grid-column: span 2;
        }

        .equals:hover {
            background-color: #81c784;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // Добавление значения на экран
        function appendValue(value) {
            display.value += value;
        }

        // Очистка экрана
        function clearDisplay() {
            display.value = '';
        }

        // Вычисление результата
        function calculate() {
            try {
                // Заменяем '×' на '*' для корректного вычисления, если нужно
                // Функция eval выполняет строку как JavaScript код
                display.value = eval(display.value);
            } catch (error) {
                display.value = 'Ошибка';
                setTimeout(clearDisplay, 1500); // Очистить через 1.5 секунды
            }
        }
    </script>

</body>
</html>
